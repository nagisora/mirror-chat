<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8" />
    <title>MirrorChat</title>
    <link rel="stylesheet" href="popup.css" />
  </head>
  <body>
    <main class="popup">
      <h1>MirrorChat</h1>
      <p class="desc">質問を入力して送信すると、ChatGPT / Claude / Gemini / Grok に順次送信し、Obsidian に保存します。</p>
      <label>
        質問
        <textarea id="prompt-input" rows="4" placeholder="ここに質問を入力..."></textarea>
      </label>
      <div class="actions">
        <button id="send-button">送信</button>
        <a href="options.html" target="_blank" class="link">設定</a>
      </div>
      <p id="status" class="status" aria-live="polite"></p>
      <section id="retry-section" class="retry-section" hidden>
        <h2>保存に失敗したデータ</h2>
        <button id="retry-button">再送信</button>
      </section>
    </main>
    <script src="storage.js"></script>
    <script src="popup.js"></script>
  </body>
</html>
