name: Create Parent PR

on:
  workflow_dispatch:
    inputs:
      base_branch:
        description: 'Base branch (e.g. main)'
        required: true
        default: 'main'
      head_branch:
        description: 'Head branch (e.g. parent/pr-12-13-15)'
        required: true
        default: 'parent/pr-12-13-15'
      title:
        description: 'PR title'
        required: true
        default: '[親PR・マージ用] #12 #13 #15 をまとめたレビュー用'
jobs:
  create-pr:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Create Pull Request
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          cat > /tmp/pr-body.md << 'BODY_EOF'
          ## 概要

          PR #12、#13、#15 をまとめた**親PR（マージ用）**です。一括レビュー後にこのPRをマージすれば、3つの変更がまとめて main に入ります。

          ## 含まれる変更（子PR）

          | PR | タイトル |
          |----|----------|
          | #12 | Claude・Geminiの送信ボタンセレクタを更新し、UI変更に対応 |
          | #13 | Claudeの回答取得速度を改善 |
          | #15 | 既存の会話に続けて質問を送信する機能を追加 |

          ## レビュー方法

          - **全体の変更**: この親PRの「Files changed」で一括確認
          - **個別のステップ**: PR #12、#13、#15 で各変更を個別に確認

          ## マージ順序（親ブランチ内）

          1. #12 → #13 → #15 の順でマージ済み

          ## 確認事項

          - [ ] E2Eテストを実行した（該当する場合）
          - [ ] 手動で動作確認した
          BODY_EOF
          gh pr create \
            --base "${{ github.event.inputs.base_branch }}" \
            --head "${{ github.event.inputs.head_branch }}" \
            --title "${{ github.event.inputs.title }}" \
            --body-file /tmp/pr-body.md \
            --draft
